services:

  postgres:
    image: postgres:16-alpine # imagem oficial, alpine = menor
    container_name: food_city_db
    environment:
      POSTGRES_DB: food_city # nome do banco criado automaticamente
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: food_pass
    ports:  # host:container — acesso local pelo DBeaver
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # dados persistem entre restarts
    healthcheck:    # garante que o banco está pronto antes do app subir
      test:  ["CMD-SHELL", "pg_isready -U food_user -d food_city"]
      interval: 10s
      timeout: 5s
      retries: 5

# ------------------------ Aplicacao Java -------------------------------------

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_city_app
    ports:
      - "8080:8080"
    environment:
      # sobrescreve o application.yml em runtime
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/food_city
      SPRING_DATASOURCE_USERNAME: food_user
      SPRING_DATASOURCE_PASSWORD: food_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy     # só sobe após o healthcheck do banco passar
    restart: on-failure                # reinicia se crashar durante startup
  # ─── Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:                       # volume nomeado — gerenciado pelo Docker